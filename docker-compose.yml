version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - coolify

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    ports:
      - "8010:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=["http://localhost:3000", "http://frontend:3000", "https://${COOLIFY_FQDN}", "https://n8n.giniloh.com", "https://scout.buildomain.com"]
      - ALLOWED_HOSTS=["*"]
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - coolify

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api/v1
        - REACT_APP_SUPABASE_URL=${SUPABASE_URL}
        - REACT_APP_SUPABASE_ANON_KEY=${SUPABASE_KEY}
        - REACT_APP_URL=https://scout.buildomain.com
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      # Secure Router (HTTPS)
      - "traefik.http.routers.scout-secure.rule=Host(`scout.buildomain.com`)"
      - "traefik.http.routers.scout-secure.entrypoints=https"
      - "traefik.http.routers.scout-secure.tls=true"
      - "traefik.http.routers.scout-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.scout-secure.service=scout-svc"
      - "traefik.http.services.scout-svc.loadbalancer.server.port=80"
      # Redirect Router (HTTP -> HTTPS)
      - "traefik.http.routers.scout-insecure.rule=Host(`scout.buildomain.com`)"
      - "traefik.http.routers.scout-insecure.entrypoints=http"
      - "traefik.http.routers.scout-insecure.middlewares=scout-redirect"
      - "traefik.http.middlewares.scout-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.scout-redirect.redirectscheme.permanent=true"
      - "traefik.docker.network=coolify"
    environment:
      - REACT_APP_API_URL=/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coolify

volumes:
  redis_data:
    driver: local

networks:
  coolify:
    external: true
